name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            if [ ! -d ~/bankningsassistenten ]; then
              git clone git@github.com:${{ github.repository }}.git ~/bankningsassistenten
            fi
            cd ~/bankningsassistenten
            git pull
            docker compose up --build -d
